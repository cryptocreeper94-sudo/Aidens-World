<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hero HQ">
  <link rel="apple-touch-icon" href="assets/ui/icon-192.png">

  <!-- iOS Splash screens -->
  <link rel="apple-touch-startup-image" href="assets/ui/splash.png">

  <!-- Prevent text selection, callouts, etc on mobile -->
  <meta name="format-detection" content="telephone=no">

  <title>Aiden's Hero HQ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
      position: fixed;
      top: 0; left: 0;
    }
    #game-container {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      image-rendering: auto;
      touch-action: none;
    }
    /* iOS safe area padding */
    @supports (padding: env(safe-area-inset-top)) {
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>

  <!-- Phaser 3 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

  <!-- Game Modules -->
  <script src="src/systems/SoundFX.js"></script>
  <script src="src/systems/SaveSystem.js"></script>
  <script src="src/systems/LevelData.js"></script>
  <script src="src/scenes/BootScene.js"></script>
  <script src="src/scenes/HubScene.js"></script>
  <script src="src/scenes/StoryScene.js"></script>
  <script src="src/scenes/LevelScene.js"></script>
  <script src="src/config.js"></script>

  <!-- Register Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[PWA] SW registered:', reg.scope))
          .catch(err => console.log('[PWA] SW registration failed:', err));
      });
    }

    // Prevent pull-to-refresh and bounce on iOS
    document.addEventListener('touchmove', (e) => {
      if (e.touches.length > 1) return;
      e.preventDefault();
    }, { passive: false });

    // Keep screen awake via Wake Lock API (if supported)
    async function requestWakeLock() {
      try {
        if ('wakeLock' in navigator) {
          await navigator.wakeLock.request('screen');
        }
      } catch (e) {}
    }
    requestWakeLock();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });
  </script>
</body>
</html>
